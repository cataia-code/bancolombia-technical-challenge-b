# Orquestacion local: n8n (orquestador) + servicio de analisis (FastAPI).
# n8n llama al servicio por HTTP en la red interna de compose (host: 'advisor').
services:
  advisor:
    build: .
    container_name: taskbot-advisor
    ports:
      - "8000:8000"          # API accesible en http://localhost:8000
    volumes:
      - ./reports:/app/reports   # los reportes quedan en el host
      - ./data:/app/data:ro      # inventario de ejemplo (solo lectura)
    environment:
      TASKBOT_LLM_ENABLED: "false"   # demo 100% offline y reproducible
      TASKBOT_INVENTORY_ROOT: "/app/data"  # /analyze solo acepta inventarios montados

  n8n:
    image: n8nio/n8n:latest
    container_name: taskbot-n8n
    ports:
      - "5678:5678"          # editor de n8n en http://localhost:5678
    environment:
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: "America/Bogota"
      # URL del servicio de analisis dentro de la red de compose.
      ADVISOR_URL: "http://advisor:8000"
    volumes:
      - ./n8n:/home/node/.n8n-import:ro   # workflow.json disponible para importar
    depends_on:
      - advisor
